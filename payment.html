<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الفاتورة | منصة التعليم</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Tajawal', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.card {
    width: 100%;
    max-width: 520px;
    background: white;
    border-radius: 22px;
    padding: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    color: #4F46E5;
    margin-bottom: 5px;
}

.sub {
    text-align: center;
    color: #666;
    margin-bottom: 20px;
}

.box {
    background: #f8f9ff;
    padding: 15px;
    border-radius: 14px;
    margin-bottom: 15px;
}

.row {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}

.badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

.pending { background: #fff3cd; color: #856404; }
.active { background: #d4edda; color: #155724; }

.amount {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    margin: 15px 0;
    color: #111;
}

/* buttons */
.btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

.whatsapp {
    background: #25D366;
    color: white;
}

.login {
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    color: white;
}

.btn:hover {
    transform: scale(1.02);
}

.note {
    text-align: center;
    font-size: 13px;
    margin-top: 10px;
    color: #666;
}
</style>
</head>

<body>

<div class="card">

    <h2>📄 فاتورة الاشتراك</h2>
    <p class="sub">تفاصيل الحساب والدفع</p>

    <div class="box">
        <div class="row">
            <span>👤 الاسم</span>
            <span id="name">...</span>
        </div>

        <div class="row">
            <span>📌 الحالة</span>
            <span id="status" class="badge pending">غير مفعل</span>
        </div>
    </div>

    <div class="amount">💰 المبلغ: 150 جنيه مصري</div>

    <div id="actions"></div>

    <p class="note">رقم التحويل: 01274445091</p>

</div>

<script>

const name = localStorage.getItem("teacherName");
const status = localStorage.getItem("accountStatus");

if (!name) {
    window.location.href = "/login.html";
}

document.getElementById("name").innerText = name;

const statusEl = document.getElementById("status");
const actions = document.getElementById("actions");

// تحديث الحالة
if (status === "active") {
    statusEl.innerText = "مُفعل";
    statusEl.classList.remove("pending");
    statusEl.classList.add("active");

    actions.innerHTML = `
        <button class="btn login" onclick="goLogin()">تسجيل الدخول</button>
    `;
} else {
    statusEl.innerText = "غير مفعل";

    actions.innerHTML = `
        <a href="https://wa.me/201274445091" target="_blank">
            <button class="btn whatsapp">تواصل واتساب</button>
        </a>
    `;
}

function goLogin() {
    window.location.href = "/login.html";
}

</script>

</body>
</html>
