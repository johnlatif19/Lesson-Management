<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدفع | منصة التعليم</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Tajawal', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding: 20px;
}

/* Card */
.card {
    width: 100%;
    max-width: 480px;
    background: white;
    border-radius: 22px;
    padding: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

/* Header */
h2 {
    color: #4F46E5;
    text-align: center;
    margin-bottom: 10px;
}

.sub {
    text-align: center;
    color: #666;
    margin-bottom: 20px;
}

/* Info box */
.info {
    background: #f3f4ff;
    padding: 15px;
    border-radius: 14px;
    margin-bottom: 15px;
}

.info p {
    margin: 8px 0;
    font-size: 15px;
    color: #333;
}

/* badge */
.badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

.pending {
    background: #fff3cd;
    color: #856404;
}

.active {
    background: #d4edda;
    color: #155724;
}

/* price */
.price {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    margin: 15px 0;
}

/* button */
button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    color: white;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.02);
}

/* status */
.status {
    text-align: center;
    margin-top: 12px;
    color: #555;
    font-size: 14px;
}

/* mobile */
@media (max-width: 500px) {
    .card { padding: 20px; }
}
</style>
</head>

<body>

<div class="card">

    <h2>إتمام عملية الدفع</h2>
    <p class="sub">استكمل الدفع لتفعيل حسابك</p>

    <div class="info">
        <p>👤 الاسم: <span id="name">...</span></p>
        <p>📌 الحالة: 
            <span id="statusBadge" class="badge pending">Pending</span>
        </p>
    </div>

    <div class="price">💰 150 جنيه مصري</div>

    <button onclick="pay()">ادفع الآن</button>

    <div class="status" id="msg"></div>
</div>

<script>
// جلب البيانات
const name = localStorage.getItem("teacherName");
const status = localStorage.getItem("accountStatus");

// حماية
if (!name) {
    window.location.href = "/login.html";
}

// عرض البيانات
document.getElementById("name").innerText = name || "غير معروف";

const badge = document.getElementById("statusBadge");

if (status === "active") {
    badge.innerText = "Active";
    badge.classList.remove("pending");
    badge.classList.add("active");
}

// الدفع (محاكاة)
function pay() {
    const msg = document.getElementById("msg");

    msg.innerHTML = "جاري معالجة الدفع... ⏳";

    setTimeout(() => {
        localStorage.setItem("accountStatus", "active");

        msg.innerHTML = "تم الدفع بنجاح ✅";

        badge.innerText = "Active";
        badge.classList.remove("pending");
        badge.classList.add("active");

        setTimeout(() => {
            window.location.href = "/login.html";
        }, 1500);

    }, 2000);
}
</script>

</body>
</html>
