<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الفاتورة</title>

<style>
body{
    font-family:tajawal;
    background:#f5f7ff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    width:90%;
    max-width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{text-align:center;color:#4f46e5}

.row{margin:12px 0;font-size:15px}

.status{
    padding:10px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
}

.pending{background:#fff3cd;color:#856404}
.active{background:#d1e7dd;color:#0f5132}

.btn{
    display:block;
    text-align:center;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

.whatsapp{background:#25D366;color:white}
.login{background:#4f46e5;color:white}
</style>
</head>

<body>

<div class="card">
    <h2>فاتورة التسجيل</h2>

    <div class="row">💰 المبلغ: 150 جنيه</div>
    <div class="row">📱 رقم التحويل: 01274445091</div>

    <div id="status" class="status pending">⏳ جاري المراجعة</div>

    <a class="btn whatsapp" 
       href="https://wa.me/201274445091" target="_blank">
       تواصل واتساب
    </a>

    <div id="loginBtn"></div>
</div>

<script>
const token = localStorage.getItem("token");

async function loadStatus(){
    const res = await fetch("/api/me", {
        headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    const statusDiv = document.getElementById("status");
    const loginBtn = document.getElementById("loginBtn");

    if(data.status === "active"){
        statusDiv.className = "status active";
        statusDiv.innerHTML = "✅ الحساب مفعل";

        loginBtn.innerHTML = `
            <a class="btn login" href="/login">
                تسجيل الدخول
            </a>
        `;
    } else {
        statusDiv.className = "status pending";
        statusDiv.innerHTML = "⏳ الحساب قيد المراجعة";
    }
}

loadStatus();

// متابعة لحظية كل 5 ثواني
setInterval(loadStatus, 5000);
</script>

</body>
</html>
