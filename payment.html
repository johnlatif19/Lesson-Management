<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الفاتورة | منصة التعليم</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Tajawal', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* Invoice card */
.card {
    width: 100%;
    max-width: 500px;
    background: #fff;
    border-radius: 22px;
    padding: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

/* header */
h2 {
    text-align: center;
    color: #4F46E5;
    margin-bottom: 5px;
}

.sub {
    text-align: center;
    color: #666;
    margin-bottom: 20px;
}

/* invoice box */
.box {
    background: #f8f9ff;
    padding: 15px;
    border-radius: 14px;
    margin-bottom: 15px;
}

.row {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    font-size: 15px;
    color: #333;
}

/* status badge */
.badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

.pending {
    background: #fff3cd;
    color: #856404;
}

.active {
    background: #d4edda;
    color: #155724;
}

/* button */
.btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

/* login button */
.login {
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    color: white;
}

.login:hover {
    transform: scale(1.02);
}

/* small note */
.note {
    text-align: center;
    margin-top: 10px;
    font-size: 13px;
    color: #666;
}

/* mobile */
@media (max-width: 500px) {
    .card { padding: 20px; }
}
</style>
</head>

<body>

<div class="card">

    <h2>📄 فاتورة الحساب</h2>
    <p class="sub">بيانات المعلم وحالة الحساب</p>

    <div class="box">
        <div class="row">
            <span>👤 الاسم</span>
            <span id="name">...</span>
        </div>

        <div class="row">
            <span>📌 حالة الحساب</span>
            <span id="statusBadge" class="badge pending">غير مفعل</span>
        </div>
    </div>

    <div id="action"></div>

    <p class="note">تم إنشاء الفاتورة تلقائيًا من النظام</p>

</div>

<script>

// جلب البيانات
const name = localStorage.getItem("teacherName");
const status = localStorage.getItem("accountStatus");

// حماية
if (!name) {
    window.location.href = "/login.html";
}

// عرض الاسم
document.getElementById("name").innerText = name;

// الحالة
const badge = document.getElementById("statusBadge");
const action = document.getElementById("action");

if (status === "active") {
    badge.innerText = "مُفعل";
    badge.classList.remove("pending");
    badge.classList.add("active");

    // زر تسجيل الدخول
    action.innerHTML = `
        <button class="btn login" onclick="goLogin()">
            تسجيل الدخول
        </button>
    `;
} else {
    badge.innerText = "غير مفعل";
}

// تحويل
function goLogin() {
    window.location.href = "/login.html";
}

</script>

</body>
</html>
