<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدفع | منصة التعليم</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Tajawal', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding: 20px;
}

/* Card */
.card {
    width: 100%;
    max-width: 450px;
    background: white;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

/* Title */
h2 {
    margin-bottom: 10px;
    color: #4F46E5;
    font-size: 24px;
}

p {
    color: #555;
    margin-bottom: 20px;
}

/* Price box */
.price-box {
    background: #f3f4ff;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
}

.price-box h3 {
    color: #111;
}

/* Button */
.btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    color: white;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.02);
}

/* Status */
.status {
    margin-top: 15px;
    font-size: 14px;
    color: #666;
}

/* Mobile */
@media (max-width: 500px) {
    .card {
        padding: 20px;
    }

    h2 {
        font-size: 20px;
    }
}
</style>
</head>

<body>

<div class="card">
    <h2>إتمام الدفع</h2>
    <p>لاستكمال التسجيل يجب دفع رسوم الاشتراك</p>

    <div class="price-box">
        <h3>💰 150 جنيه مصري</h3>
    </div>

    <button class="btn" onclick="pay()">ادفع الآن</button>

    <div class="status" id="status"></div>
</div>

<script>
// حماية بسيطة
const user = localStorage.getItem("teacherName");

if (!user) {
    window.location.href = "/login.html";
}

// محاكاة الدفع
function pay() {
    const status = document.getElementById("status");

    status.innerHTML = "جاري معالجة الدفع... ⏳";

    setTimeout(() => {
        localStorage.setItem("accountStatus", "active");

        status.innerHTML = "تم الدفع بنجاح ✅ سيتم تحويلك";

        setTimeout(() => {
            window.location.href = "/login.html";
        }, 1500);

    }, 2000);
}
</script>

</body>
</html>
