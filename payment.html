<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>الفاتورة | منصة التعليم</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(145deg, #10172b 0%, #1e2a4a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    /* تأثير خلفية أنيق */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 40%, rgba(79, 70, 229, 0.15), transparent 70%);
      pointer-events: none;
    }

    /* تصميم الفاتورة الرئيسي */
    .invoice-card {
      max-width: 520px;
      width: 100%;
      background: #ffffff;
      border-radius: 36px;
      box-shadow: 0 35px 65px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.1);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .invoice-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 40px 75px rgba(0, 0, 0, 0.4);
    }

    /* رأس الفاتورة */
    .invoice-header {
      background: linear-gradient(120deg, #4F46E5, #7C3AED);
      padding: 28px 24px 22px;
      text-align: center;
      color: white;
    }

    .invoice-badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .invoice-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .invoice-sub {
      font-size: 14px;
      opacity: 0.9;
      font-weight: 500;
    }

    /* محتوى الفاتورة */
    .invoice-body {
      padding: 24px 28px 32px;
      background: #fff;
    }

    /* بطاقة المستخدم */
    .user-section {
      background: #F8FAFE;
      border-radius: 24px;
      padding: 18px 20px;
      margin-bottom: 24px;
      border: 1px solid #EFF3F8;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }

    .user-label {
      font-size: 13px;
      font-weight: 500;
      color: #5B6E8C;
      letter-spacing: 0.3px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-name {
      font-size: 20px;
      font-weight: 800;
      color: #1E293B;
      word-break: break-word;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge-id {
      background: #E6EDFC;
      color: #4F46E5;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 40px;
    }

    /* صفوف الفاتورة */
    .invoice-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #EDF2F7;
    }

    .invoice-row:last-child {
      border-bottom: none;
    }

    .row-label {
      font-weight: 600;
      color: #475569;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .row-value {
      font-weight: 800;
      font-size: 18px;
      color: #0F172A;
    }

    .transfer-number {
      background: #F1F5F9;
      padding: 5px 12px;
      border-radius: 30px;
      font-family: monospace;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    /* حالة الحساب */
    .status-container {
      margin: 24px 0 20px;
    }

    .status-card {
      border-radius: 24px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.2s;
    }

    .status-pending {
      background: #FFFBEB;
      border-right: 5px solid #F59E0B;
      color: #B45309;
    }

    .status-active {
      background: #ECFDF5;
      border-right: 5px solid #10B981;
      color: #065F46;
    }

    .status-rejected {
      background: #FEF2F2;
      border-right: 5px solid #EF4444;
      color: #991B1B;
    }

    .status-stopped {
      background: #FEFCE8;
      border-right: 5px solid #EAB308;
      color: #854D0E;
    }

    .status-expired {
      background: #FFEDD5;
      border-right: 5px solid #F97316;
      color: #9A3412;
    }

    /* الأزرار */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      padding: 14px 18px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 15px;
      transition: all 0.25s;
      text-align: center;
      border: none;
      cursor: pointer;
    }

    .btn-whatsapp {
      background: #25D366;
      color: white;
      box-shadow: 0 4px 8px rgba(37, 211, 102, 0.2);
    }

    .btn-login {
      background: #4F46E5;
      color: white;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
    }

    .btn-warning {
      background: #F97316;
      color: white;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    }

    /* تذييل الفاتورة */
    .invoice-footer {
      text-align: center;
      padding-top: 20px;
      font-size: 11px;
      color: #94A3B8;
      border-top: 1px solid #EFF3F8;
      margin-top: 20px;
    }

    /* تحسينات الاستجابة الكاملة */
    @media (max-width: 560px) {
      body {
        padding: 16px;
      }
      .invoice-body {
        padding: 20px 18px 26px;
      }
      .invoice-header {
        padding: 22px 18px;
      }
      .invoice-title {
        font-size: 24px;
      }
      .user-name {
        font-size: 18px;
      }
      .row-value {
        font-size: 16px;
      }
      .btn {
        padding: 12px 16px;
      }
      .transfer-number {
        font-size: 14px;
      }
    }

    @media (max-width: 400px) {
      .invoice-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }
      .row-value {
        align-self: flex-start;
      }
    }
  </style>
</head>
<body>

<div class="invoice-card">
  <div class="invoice-header">
    <div class="invoice-badge">
      📄 فاتورة إلكترونية
    </div>
    <div class="invoice-title">
      فاتورة التسجيل
    </div>
    <div class="invoice-sub">
      يرجى إتمام الدفع لتفعيل الحساب
    </div>
  </div>

  <div class="invoice-body">
    <!-- قسم بيانات المستخدم -->
    <div class="user-section">
      <div class="user-label">
        <span>👤</span> بيانات المشترك
      </div>
      <div class="user-name">
        <span id="userNameDisplay">———</span>
        <span class="badge-id" id="userIdBadge">#ID</span>
      </div>
    </div>

    <!-- تفاصيل الفاتورة -->
    <div class="invoice-row">
      <div class="row-label">
        <span>💰</span> المبلغ المطلوب
      </div>
      <div class="row-value" id="priceValue">
        <span>٠.٠٠ جنيه</span>
      </div>
    </div>

    <div class="invoice-row">
      <div class="row-label">
        <span>🏦</span> رقم التحويل (فودافون كاش)
      </div>
      <div class="row-value transfer-number">
        01274445091
      </div>
    </div>

    <div class="invoice-row">
      <div class="row-label">
        <span>🕒</span> تاريخ الفاتورة
      </div>
      <div class="row-value" id="invoiceDate">
        —
      </div>
    </div>

    <!-- حالة الحساب الديناميكية -->
    <div class="status-container" id="statusContainer">
      <div class="status-card status-pending" id="statusBox">
        <span>⏳</span> جاري المراجعة
      </div>
    </div>

    <!-- الأزرار الديناميكية -->
    <div class="actions" id="dynamicButtons">
      <a class="btn btn-whatsapp" href="https://wa.me/201274445091" target="_blank" rel="noopener noreferrer">
        📱 تواصل عبر واتساب
      </a>
    </div>

    <div class="invoice-footer">
      هذه فاتورة رسمية صادرة عن منصة التعليم
    </div>
  </div>
</div>

<script>
  (function() {
    // الحصول على التوكن من localStorage
    const token = localStorage.getItem("token");

    // التحقق من وجود التوكن وإعادة التوجيه إذا لم يكن موجوداً
    if (!token) {
      window.location.href = "/login";
      return;
    }

    // عناصر DOM الرئيسية
    const userNameSpan = document.getElementById("userNameDisplay");
    const userIdBadge = document.getElementById("userIdBadge");
    const priceSpan = document.getElementById("priceValue");
    const statusBox = document.getElementById("statusBox");
    const dynamicButtonsDiv = document.getElementById("dynamicButtons");
    const invoiceDateSpan = document.getElementById("invoiceDate");

    // عرض التاريخ الحالي للفاتورة (تاريخ حقيقي)
    const today = new Date();
    const formattedDate = today.toLocaleDateString("ar-EG", { year: 'numeric', month: 'long', day: 'numeric' });
    if (invoiceDateSpan) invoiceDateSpan.innerText = formattedDate;

    // دالة تحديث واجهة الفاتورة بناءً على البيانات الحقيقية من الـ API
    function renderUI(userData) {
      // تعيين اسم المستخدم
      if (userData.name && userData.name.trim() !== "") {
        userNameSpan.innerText = userData.name;
      } else {
        userNameSpan.innerText = "مستخدم المنصة";
      }

      // إظهار معرف المستخدم إذا كان موجوداً
      if (userData.id) {
        userIdBadge.innerText = `#${userData.id}`;
      } else if (userData.userId) {
        userIdBadge.innerText = `#${userData.userId}`;
      } else {
        userIdBadge.innerText = "#المستخدم";
      }

      // معالجة السعر الفعلي (قيمة حقيقية من السيرفر)
      let priceAmount = 150; // قيمة احتياطية فقط في حال عدم وجود سعر في الرد
      if (userData.price !== undefined && userData.price !== null) {
        priceAmount = userData.price;
      } else if (userData.amount !== undefined && userData.amount !== null) {
        priceAmount = userData.amount;
      }
      
      let priceText = `${priceAmount} جنيه`;
      // التحقق من وجود عرض خاص (offer) حقيقي من البيانات
      if (userData.offer === true || userData.offer === "true" || userData.specialOffer === true) {
        priceText += ` <span style="background:#FEF3C7; font-size:12px; padding:2px 10px; border-radius:30px; margin-right:6px; display:inline-block;">🎁 عرض خاص</span>`;
      }
      priceSpan.innerHTML = priceText;

      // تحديد الحالة الفعلية من الـ API
      const userStatus = userData.status || "pending";
      let statusClass = "status-pending";
      let statusIcon = "⏳";
      let statusMessage = "الحساب قيد المراجعة";

      // تخصيص شكل الحالة حسب القيمة المستلمة
      switch (userStatus) {
        case "active":
          statusClass = "status-active";
          statusIcon = "✅";
          statusMessage = "الحساب مفعل - يمكنك الدخول الآن";
          break;
        case "pending":
          statusClass = "status-pending";
          statusIcon = "⏳";
          statusMessage = "الحساب قيد المراجعة";
          break;
        case "rejected":
          statusClass = "status-rejected";
          statusIcon = "❌";
          statusMessage = "تم رفض الطلب";
          break;
        case "stopped":
          statusClass = "status-stopped";
          statusIcon = "⛔";
          statusMessage = "الحساب موقوف مؤقتاً";
          break;
        case "expired":
          statusClass = "status-expired";
          statusIcon = "⌛";
          statusMessage = "الاشتراك انتهى - يرجى التجديد";
          break;
        default:
          statusClass = "status-pending";
          statusIcon = "⏳";
          statusMessage = "جاري المراجعة";
      }

      // تحديث واجهة حالة الحساب
      statusBox.className = `status-card ${statusClass}`;
      statusBox.innerHTML = `<span>${statusIcon}</span> ${statusMessage}`;

      // بناء الأزرار بناءً على الحالة (مع الحفاظ على زر واتساب الأساسي)
      let buttonsHtml = `<a class="btn btn-whatsapp" href="https://wa.me/201274445091" target="_blank" rel="noopener noreferrer">📱 تواصل عبر واتساب</a>`;

      if (userStatus === "active") {
        buttonsHtml += `<a href="/login.html" class="btn btn-login">🔐 تسجيل الدخول إلى المنصة</a>`;
      } 
      else if (userStatus === "rejected") {
        buttonsHtml += `<a href="/signin.html" class="btn btn-login">📝 تسجيل مرة أخرى</a>`;
      }
      else if (userStatus === "expired") {
        buttonsHtml += `<a href="https://wa.me/201274445091" class="btn btn-warning" target="_blank">💳 تجديد الاشتراك</a>`;
      }
      else if (userStatus === "stopped") {
        buttonsHtml += `<a href="https://wa.me/201274445091" class="btn btn-whatsapp" target="_blank">📞 التواصل مع الدعم</a>`;
      }
      else if (userStatus === "pending") {
        // إضافة ملاحظة مرئية للمستخدم بدون لودر
        buttonsHtml += `<div style="font-size:12px; color:#64748b; text-align:center; margin-top:6px;">📌 بعد إتمام الدفع، سيتم تحديث الحالة تلقائياً</div>`;
      }

      dynamicButtonsDiv.innerHTML = buttonsHtml;
    }

    // دالة جلب البيانات من الـ API الحقيقي (بدون أي بيانات تجريبية)
    async function loadUserData() {
      try {
        const response = await fetch("/api/me", {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json"
          },
          cache: "no-store"
        });

        // التحقق من صلاحية التوكن
        if (!response.ok) {
          if (response.status === 401 || response.status === 403) {
            // التوكن غير صالح أو منتهي الصلاحية
            localStorage.removeItem("token");
            window.location.href = "/login";
            return;
          } else {
            // خطأ آخر من السيرفر - نعرض رسالة خطأ واضحة دون لودر
            console.warn("API responded with error status:", response.status);
            userNameSpan.innerText = "حدث خطأ";
            priceSpan.innerHTML = "--- جنيه";
            dynamicButtonsDiv.innerHTML = `<a class="btn btn-whatsapp" href="https://wa.me/201274445091" target="_blank">📱 تواصل عبر واتساب</a><div style="font-size:12px;color:#e11d48; margin-top:8px;">⚠️ حدث خطأ في تحميل البيانات، سيتم إعادة المحاولة</div>`;
            return;
          }
        }

        const userData = await response.json();
        // تحديث الفاتورة بالبيانات الحقيقية
        renderUI(userData);
      } catch (error) {
        // خطأ في الاتصال بالشبكة - لا نستخدم لودر
        console.error("Fetch error:", error);
        userNameSpan.innerText = "خطأ في الاتصال";
        priceSpan.innerHTML = "--- جنيه";
        dynamicButtonsDiv.innerHTML = `<a class="btn btn-whatsapp" href="https://wa.me/201274445091" target="_blank">📱 تواصل عبر واتساب</a><div style="font-size:12px;color:#dc2626; margin-top:8px;">⚠️ خطأ في الشبكة، جارٍ إعادة المحاولة</div>`;
      }
    }

    // التحميل الأول للبيانات
    loadUserData();

    // تحديث دوري كل 4 ثواني لمتابعة الحالة بشكل لحظي (بدون ظهور أي لودر)
    // المستخدم لن يشعر بأي مؤشر تحميل، فقط يتم تحديث المحتوى تلقائياً
    setInterval(() => {
      loadUserData();
    }, 4000);
  })();
</script>
</body>
</html>
