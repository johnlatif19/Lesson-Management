<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تسجيل معلم | منصة التعليم</title>
    <!-- Google Fonts - Tajawal for modern Arabic feel -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (Free Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* decorative animated circles */
        body::before {
            content: "";
            position: absolute;
            top: 10%;
            left: 5%;
            width: 250px;
            height: 250px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 12s infinite ease-in-out;
            z-index: 0;
        }

        body::after {
            content: "";
            position: absolute;
            bottom: 8%;
            right: 3%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            animation: float 10s infinite reverse;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1);}
            50% { transform: translateY(-30px) scale(1.05);}
            100% { transform: translateY(0px) scale(1);}
        }

        /* main card */
        .register-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.35), 0 4px 12px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 520px;
            padding: 2rem 2rem 2.5rem;
            transition: transform 0.2s ease;
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .register-card:hover {
            transform: translateY(-5px);
        }

        /* header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h2 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(120deg, #4F46E5, #7C3AED);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.3px;
        }

        .header p {
            color: #5b6e8c;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .teacher-icon {
            background: #f3f4ff;
            width: 70px;
            height: 70px;
            line-height: 70px;
            text-align: center;
            border-radius: 50%;
            margin: 0 auto 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.3rem;
            color: #4F46E5;
            box-shadow: 0 6px 12px rgba(79,70,229,0.15);
        }

        /* input groups */
        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 1.2rem;
            transition: color 0.2s;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 3rem 1rem 1.2rem;
            font-size: 1rem;
            font-family: 'Tajawal', sans-serif;
            border: 2px solid #e2e8f0;
            border-radius: 1.5rem;
            background: #fefefe;
            transition: all 0.2s;
            outline: none;
            font-weight: 500;
            color: #1e293b;
        }

        .input-group input:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
            background: #ffffff;
        }

        .input-group input:focus + i {
            color: #7C3AED;
        }

        /* helper text for image preview */
        .image-preview-area {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
            justify-content: flex-start;
            flex-wrap: wrap;
        }

        .preview-img {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e2e8f0;
            background: #f1f5f9;
            display: none;
            transition: all 0.2s;
        }

        .preview-placeholder {
            font-size: 0.75rem;
            color: #5b6e8c;
            background: #f8fafc;
            padding: 0.3rem 0.9rem;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* button */
        .btn-signup {
            background: linear-gradient(95deg, #4F46E5, #7C3AED);
            width: 100%;
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            color: white;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 0.5rem;
            box-shadow: 0 8px 18px rgba(79,70,229,0.3);
        }

        .btn-signup:hover {
            background: linear-gradient(95deg, #4338ca, #6d28d9);
            transform: scale(0.98);
            box-shadow: 0 4px 12px rgba(79,70,229,0.4);
        }

        .btn-signup:active {
            transform: scale(0.96);
        }

        /* info note */
        .info-note {
            background: #f1f5f9;
            border-radius: 1rem;
            padding: 0.7rem;
            margin-top: 1.8rem;
            text-align: center;
            font-size: 0.8rem;
            color: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .info-note i {
            font-size: 0.9rem;
            color: #4F46E5;
        }

        /* loader & toast (dynamic) */
        .toast-message {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(8px);
            background: rgba(30,41,59,0.95);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .toast-message.show {
            transform: translateX(-50%) translateY(0px);
        }

        /* responsiveness */
        @media (max-width: 560px) {
            .register-card {
                padding: 1.5rem;
            }
            .header h2 {
                font-size: 1.7rem;
            }
            .btn-signup {
                padding: 0.85rem;
                font-size: 1rem;
            }
            .input-group input {
                padding: 0.85rem 3rem 0.85rem 1rem;
            }
        }

        @media (max-width: 450px) {
            body {
                padding: 1rem;
            }
            .register-card {
                border-radius: 1.5rem;
            }
        }

        /* disable button while loading */
        .btn-signup.loading {
            opacity: 0.7;
            cursor: wait;
            transform: none;
        }
    </style>
    <style>
.buttons-container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 100%;
    max-width: 320px;
    margin: 20px auto;
}

.btn {
    text-decoration: none;
    text-align: center;
    padding: 12px 18px;
    border-radius: 12px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    transition: 0.3s;
    display: block;
}

.btn-login {
    background: white;
    color: #4F46E5;
    border: 2px solid #4F46E5;
}

.btn-login:hover {
    background: #4F46E5;
    color: white;
}

.btn-signup {
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    color: white;
    border: none;
}

.btn-signup:hover {
    opacity: 0.9;
    transform: scale(1.02);
}
    </style>
</head>
<body>

<div class="register-card">
    <div class="header">
        <div class="teacher-icon">
            <i class="fas fa-chalkboard-user"></i>
        </div>
        <h2>تسجيل معلم جديد</h2>
        <p>انضم إلى منصة التعليم المتميزة</p>
    </div>

    <div class="input-group">
        <i class="fas fa-user-graduate"></i>
        <input type="text" id="name" placeholder="الاسم الكامل" autocomplete="off">
    </div>

    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="كلمة المرور">
    </div>

    <button class="btn-signup" id="signupBtn">
        <i class="fas fa-pen-fancy"></i> تسجيل المعلم
        <i class="fas fa-arrow-left"></i>
    </button>

<div class="buttons-container">
    <a href="login.html" class="btn btn-login">
        هل لديك حساب؟ تسجيل الدخول
    </a>
</div>
    
    <div class="info-note">
        <i class="fas fa-clock"></i>
        <span>بعد التسجيل، سيتم مراجعة طلبك وتفعيله قريباً</span>
    </div>
</div>

<!-- toast element for feedback -->
<div id="toastMsg" class="toast-message">
    <i class="fas fa-check-circle"></i>
    <span id="toastText">تم التسجيل بنجاح</span>
</div>

<script>
    // DOM elements
    const nameInput = document.getElementById('name');
    const passwordInput = document.getElementById('password');
    const signupBtn = document.getElementById('signupBtn');
    const previewImg = document.getElementById('previewImg');
    const previewPlaceholder = document.getElementById('previewPlaceholder');
    const toastMsgDiv = document.getElementById('toastMsg');
    const toastTextSpan = document.getElementById('toastText');

    // Helper: show dynamic toast
    let toastTimeout = null;
    function showToast(message, isError = false) {
        // clear previous timeout to avoid overlapping
        if (toastTimeout) clearTimeout(toastTimeout);
        
        toastTextSpan.innerHTML = isError ? `<i class="fas fa-exclamation-triangle" style="margin-left: 6px;"></i> ${message}` : `<i class="fas fa-check-circle" style="margin-left: 6px;"></i> ${message}`;
        toastMsgDiv.classList.add('show');
        
        // automatically hide after 3 seconds
        toastTimeout = setTimeout(() => {
            toastMsgDiv.classList.remove('show');
        }, 3000);
    }

    // validate form fields with arabic/english support and trimming
    function validateForm() {
        let nameVal = nameInput.value.trim();
        let passVal = passwordInput.value;
        
        if (nameVal === "") {
            showToast("الرجاء إدخال الاسم الكامل", true);
            nameInput.focus();
            return false;
        }
        if (nameVal.length < 3) {
            showToast("الاسم يجب أن يكون 3 أحرف على الأقل", true);
            nameInput.focus();
            return false;
        }
        if (passVal === "") {
            showToast("كلمة المرور مطلوبة", true);
            passwordInput.focus();
            return false;
        }
        if (passVal.length < 4) {
            showToast("كلمة المرور يجب أن تكون 4 محارف أو أكثر", true);
            passwordInput.focus();
            return false;
        }
        return true;
    }
    
    // simulate loading state and call actual API (mock /api/signin)
    async function signup() {
        // validation before any request
        if (!validateForm()) {
            return;
        }
        
        // get fresh values
        const nameValue = nameInput.value.trim();
        const passwordValue = passwordInput.value;
        
        // prepare payload
        const payload = {
            name: nameValue,
            password: passwordValue,
        };
        
        // disable button and add loading class
        let originalBtnHTML = signupBtn.innerHTML;
        signupBtn.disabled = true;
        signupBtn.classList.add('loading');
        signupBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري التسجيل...';
        
        try {
            // actual fetch to backend endpoint "/api/signin" (as in original code)
            // but we also handle network errors gracefully and preserve the spec
            const response = await fetch("/api/signin", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            
            // even if response status is not OK, we still show the default message? 
            // But according to original code, it just waits for activation regardless.
            // We'll enhance: if server returns an error we show custom message, but after alert 
            // we also keep the original "تم التسجيل وانتظر التفعيل" feel. 
            // However original design: no error handling. But providing both styles:
            if (response.ok) {
    showToast("✅ تم التسجيل بنجاح! في انتظار التفعيل", false);

    localStorage.setItem("teacherName", nameValue);
    localStorage.setItem("accountStatus", "pending");

    localStorage.setItem("token", data.token);
    window.location.href = "/payment";
    } else {
                // server responded with error (like 400/500) but we still want to show registration request sent
                showToast("⚠️ تم إرسال الطلب، لكن الخادم استجاب بشكل غير متوقع، انتظر التفعيل", false);
            }
            
            // original alert from requirement – but we also provide sweet modern toast
            // to match expected user feedback, but we also keep alert? Actually the spec had alert("تم التسجيل وانتظر التفعيل");
            // To be fully respectful, we will alert as well but also elegant toast. (double but consistent)
            // BUT modern ux: can keep alert OR use only toast. I'll call alert but after small delay to not conflict? 
            // However I'll keep both: alert after fetch (like original) plus toast modern. But alert might be intrusive but matches original expectation.
            // Let's call alert exactly as requested but with nice design. Actually the requirement said "alert("تم التسجيل وانتظر التفعيل");"
            // So we maintain that plus improved visuals.
            alert("تم التسجيل وانتظر التفعيل");
            
            // optional: reset form? No, keep as is or clear sensitive? Up to preference, but we keep values.
            // just to improve UX, clear password field for security
            passwordInput.value = "";
            // but name and image stay
            // reset preview if image cleared? Not needed.
            
        } catch (error) {
            console.error("Fetch error:", error);
            // network error or backend unreachable
            let errorMsg = "حدث خطأ في الاتصال بالخادم. تأكد من اتصال الإنترنت ثم حاول مجددًا.";
            showToast(errorMsg, true);
            alert("❗ فشل الاتصال: " + errorMsg);
        } finally {
            // re-enable button after API call finishes
            signupBtn.disabled = false;
            signupBtn.classList.remove('loading');
            signupBtn.innerHTML = originalBtnHTML;
        }
    }
    
    // attach event to button with async function
    signupBtn.addEventListener('click', (e) => {
        e.preventDefault();
        signup();
    });
    
    // optional: allow pressing Enter key on any input to submit
    const inputs = [nameInput, passwordInput];
    inputs.forEach(input => {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                signup();
            }
        });
    });
</script>
</body>
</html>
