<!DOCTYPE html>
<html>
<body>
<h2>تسجيل معلم</h2>

<input id="name" placeholder="الاسم">
<input id="password" placeholder="الباسورد" type="password">
<input id="image" placeholder="رابط الصورة">

<button onclick="signup()">تسجيل</button>

<script>
async function signup(){
  await fetch("/api/signin",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      name: name.value,
      password: password.value,
      image: image.value
    })
  });

  alert("تم التسجيل وانتظر التفعيل");
}
</script>
</body>
</html>
