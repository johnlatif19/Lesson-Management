<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل معلم</title>

<style>
  body {
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }

  .card {
    background:white;
    padding:25px;
    border-radius:20px;
    width:320px;
    text-align:center;
  }

  input {
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ccc;
  }

  button {
    width:100%;
    padding:10px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
  }

  .link {
    margin-top:10px;
    display:block;
    color:#4f46e5;
    cursor:pointer;
    text-decoration:none;
  }
</style>
</head>

<body>

<div class="card">
  <h2>تسجيل معلم</h2>

  <input id="name" placeholder="الاسم">
  <input id="password" type="password" placeholder="كلمة المرور">

  <button onclick="signup()">تسجيل</button>

  <!-- زر التحويل -->
  <a class="link" href="login.html">هل لديك حساب؟ تسجيل الدخول</a>
</div>

<script>
function signup() {
  localStorage.setItem("teacher", document.getElementById("name").value);
  alert("تم التسجيل");
  location.href = "index.html";
}
</script>

</body>
</html>
