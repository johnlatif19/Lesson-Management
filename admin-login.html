<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>دخول الأدمن | لوحة التحكم</title>
    <!-- Google Font - Tajawal (modern Arabic) -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (optimized) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
            /* improved font rendering */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* animated gradient orbs - subtle on mobile */
        body::before {
            content: "";
            position: absolute;
            width: clamp(200px, 50vw, 350px);
            height: clamp(200px, 50vw, 350px);
            background: radial-gradient(circle, rgba(139,92,246,0.3) 0%, rgba(6,182,212,0.1) 70%);
            top: -80px;
            left: -80px;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
            animation: floatOrb 18s infinite alternate ease-in-out;
        }

        body::after {
            content: "";
            position: absolute;
            width: clamp(250px, 55vw, 400px);
            height: clamp(250px, 55vw, 400px);
            background: radial-gradient(circle, rgba(236,72,153,0.25) 0%, rgba(79,70,229,0.1) 80%);
            bottom: -80px;
            right: -80px;
            border-radius: 50%;
            filter: blur(70px);
            z-index: 0;
            animation: floatOrbReverse 20s infinite alternate ease-in-out;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(30px, 30px) scale(1.2); opacity: 0.8; }
        }

        @keyframes floatOrbReverse {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(-40px, -30px) scale(1.25); opacity: 0.7; }
        }

        /* main admin card - fully responsive glassmorphism */
        .admin-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border-radius: clamp(1.8rem, 6vw, 2.5rem);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 500px;
            padding: clamp(1.5rem, 5vw, 2.5rem) clamp(1.2rem, 4vw, 2rem) clamp(1.8rem, 5vw, 2.8rem);
            transition: transform 0.3s ease, box-shadow 0.3s;
            z-index: 5;
            border: 1px solid rgba(255, 255, 255, 0.12);
            margin: 0.5rem;
        }

        .admin-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        /* header premium with responsive sizing */
        .admin-header {
            text-align: center;
            margin-bottom: clamp(1.5rem, 4vw, 2rem);
        }

        .shield-icon {
            background: linear-gradient(135deg, #2d2a5e, #4c1d95);
            width: clamp(70px, 18vw, 85px);
            height: clamp(70px, 18vw, 85px);
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: clamp(24px, 7vw, 30px);
            font-size: clamp(2rem, 6vw, 2.8rem);
            color: #fbbf24;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.2s;
        }

        .admin-header h2 {
            font-size: clamp(1.5rem, 7vw, 2rem);
            font-weight: 800;
            background: linear-gradient(120deg, #FDE68A, #FBBF24);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 3px rgba(0,0,0,0.2);
        }

        .admin-header p {
            color: #cbd5e1;
            font-size: clamp(0.75rem, 3.5vw, 0.85rem);
            margin-top: 0.4rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .admin-header p i {
            font-size: 0.75rem;
            color: #fbbf24;
        }

        /* input group - fully responsive */
        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
            width: 100%;
        }

        .input-group i:first-of-type {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.2rem;
            transition: all 0.2s;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            padding: clamp(0.85rem, 3.5vw, 1rem) clamp(2.8rem, 8vw, 3rem) clamp(0.85rem, 3.5vw, 1rem) clamp(1rem, 4vw, 1.2rem);
            font-size: clamp(0.9rem, 4vw, 1rem);
            font-family: 'Tajawal', sans-serif;
            background: rgba(30, 41, 59, 0.7);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 1.5rem;
            color: #f1f5f9;
            font-weight: 500;
            transition: all 0.25s;
            outline: none;
            backdrop-filter: blur(5px);
        }

        .input-group input:focus {
            border-color: #fbbf24;
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2);
        }

        .input-group input:focus + i {
            color: #fbbf24;
        }

        .input-group input::placeholder {
            color: #7e8ba3;
            font-weight: 400;
            font-size: clamp(0.8rem, 3.5vw, 0.9rem);
        }

        /* toggle password eye - better touch area */
        .toggle-admin-pw {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            font-size: 1.2rem;
            transition: color 0.2s;
            z-index: 3;
            padding: 6px;
            background: transparent;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-admin-pw:hover {
            color: #fbbf24;
        }

        .toggle-admin-pw:active {
            transform: translateY(-50%) scale(0.95);
        }

        /* login CTA button - responsive */
        .btn-admin-login {
            background: linear-gradient(100deg, #f59e0b, #d97706);
            width: 100%;
            border: none;
            padding: clamp(0.85rem, 4vw, 1rem);
            font-size: clamp(0.95rem, 4.5vw, 1.1rem);
            font-weight: 800;
            font-family: 'Tajawal', sans-serif;
            color: #0f172a;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 0.5rem;
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3);
        }

        .btn-admin-login:hover {
            background: linear-gradient(100deg, #fbbf24, #f59e0b);
            transform: scale(0.98);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.5);
        }

        .btn-admin-login:active {
            transform: scale(0.96);
        }

        /* loading state */
        .btn-admin-login.loading {
            opacity: 0.7;
            cursor: wait;
            transform: scale(1);
            pointer-events: none;
        }

        /* secure badge footer - fully responsive */
        .secure-footer {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 1rem;
            padding: 0.7rem;
            margin-top: 1.8rem;
            text-align: center;
            font-size: clamp(0.65rem, 3vw, 0.75rem);
            color: #a5b4fc;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(6px, 3vw, 10px);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
        }

        .secure-footer i {
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            color: #fbbf24;
        }

        /* Toast notifications - optimized for mobile */
        .toast-notify {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(16px);
            color: #f8fafc;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            z-index: 1500;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
            font-size: clamp(0.8rem, 3.8vw, 0.9rem);
            display: flex;
            align-items: center;
            gap: 10px;
            border-right: 4px solid #fbbf24;
            font-family: 'Tajawal', sans-serif;
            max-width: 90vw;
            white-space: nowrap;
            flex-wrap: nowrap;
            direction: rtl;
        }

        /* on very small screens, allow text to wrap and adjust width */
        @media (max-width: 480px) {
            .toast-notify {
                white-space: normal;
                text-align: center;
                max-width: 85vw;
                padding: 10px 18px;
                border-radius: 40px;
            }
        }

        .toast-notify.show {
            transform: translateX(-50%) translateY(0px);
        }

        /* subtle error shake */
        @keyframes adminShake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            60% { transform: translateX(6px); }
        }

        .shake-admin {
            animation: adminShake 0.4s ease-in-out 0s 1;
        }

        /* ========== EXTREME RESPONSIVENESS ========== */
        /* Large desktops (fine already) */
        /* Tablets and medium screens */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .admin-card {
                max-width: 90%;
                margin: 0 auto;
            }
        }

        /* Mobile landscape */
        @media (max-width: 640px) {
            .admin-card {
                max-width: 95%;
                padding: 1.5rem 1.2rem 2rem;
            }
            .toggle-admin-pw {
                left: 12px;
                width: 32px;
                height: 32px;
            }
            .input-group i:first-of-type {
                right: 14px;
            }
            .btn-admin-login {
                gap: 8px;
            }
        }

        /* Small phones */
        @media (max-width: 480px) {
            .admin-card {
                padding: 1.2rem;
                border-radius: 1.6rem;
            }
            .shield-icon {
                width: 65px;
                height: 65px;
                font-size: 2rem;
                border-radius: 20px;
            }
            .input-group input {
                padding: 0.75rem 2.5rem 0.75rem 1rem;
            }
            .toggle-admin-pw {
                left: 10px;
            }
            .secure-footer {
                gap: 8px;
                padding: 0.6rem 0.5rem;
            }
        }

        /* Extra small devices (<=360px) */
        @media (max-width: 360px) {
            .admin-header h2 {
                font-size: 1.35rem;
            }
            .btn-admin-login {
                font-size: 0.85rem;
                padding: 0.7rem;
            }
            .secure-footer span {
                font-size: 0.6rem;
            }
            .toast-notify {
                font-size: 0.75rem;
                bottom: 12px;
            }
        }

        /* touch-friendly: larger hit area for buttons and toggles */
        @media (hover: none) and (pointer: coarse) {
            .btn-admin-login, .toggle-admin-pw, .input-group input {
                cursor: default;
            }
            .toggle-admin-pw {
                padding: 8px;
                width: 40px;
                height: 40px;
            }
            .btn-admin-login:active {
                transform: scale(0.96);
            }
        }

        /* high-resolution screens & foldables */
        @media (min-width: 1400px) {
            .admin-card {
                max-width: 520px;
                padding: 2.5rem 2.2rem 3rem;
            }
        }

        /* ensure no horizontal overflow */
        html, body {
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="admin-header">
        <div class="shield-icon">
            <i class="fas fa-shield-haltered"></i>
        </div>
        <h2>دخول الأدمن</h2>
        <p><i class="fas fa-lock"></i> منطقة آمنة للمشرفين فقط</p>
    </div>

    <div class="input-group">
        <i class="fas fa-key"></i>
        <input type="password" id="adminPass" placeholder="كلمة المرور السرية للأدمن" autocomplete="off" inputmode="text">
        <i class="fas fa-eye toggle-admin-pw" id="toggleAdminEye" role="button" aria-label="إظهار/إخفاء كلمة المرور"></i>
    </div>

    <button class="btn-admin-login" id="adminLoginBtn">
        <i class="fas fa-arrow-left"></i> دخول إلى لوحة التحكم
        <i class="fas fa-gauge-high"></i>
    </button>

    <div class="secure-footer">
        <i class="fas fa-fingerprint"></i>
        <span>اتصال مشفر بالكامل | صلاحيات المشرف</span>
        <i class="fas fa-database"></i>
    </div>
</div>

<!-- Toast container -->
<div id="adminToast" class="toast-notify">
    <i class="fas fa-circle-exclamation"></i>
    <span id="toastAdminMsg">مرحباً أيها المدير</span>
</div>

<script>
    // DOM elements
    const passwordInput = document.getElementById('adminPass');
    const loginBtn = document.getElementById('adminLoginBtn');
    const toastDiv = document.getElementById('adminToast');
    const toastMsgSpan = document.getElementById('toastAdminMsg');
    const toggleEye = document.getElementById('toggleAdminEye');

    // Toast helper with responsive duration
    let toastTimer = null;
    function showAdminToast(message, isError = false, duration = 3200) {
        if (toastTimer) clearTimeout(toastTimer);
        const icon = isError ? '<i class="fas fa-skull-crosswalk"></i>' : '<i class="fas fa-check-double"></i>';
        toastMsgSpan.innerHTML = `${icon} ${message}`;
        toastDiv.classList.add('show');
        toastTimer = setTimeout(() => {
            toastDiv.classList.remove('show');
        }, duration);
    }

    // Shake animation for card on failed attempt
    function shakeAdminCard() {
        const card = document.querySelector('.admin-card');
        card.classList.add('shake-admin');
        setTimeout(() => {
            card.classList.remove('shake-admin');
        }, 500);
    }

    // Toggle password visibility for admin (mobile friendly)
    let isPasswordRevealed = false;
    toggleEye.addEventListener('click', (e) => {
        e.preventDefault();
        isPasswordRevealed = !isPasswordRevealed;
        passwordInput.type = isPasswordRevealed ? 'text' : 'password';
        // toggle icon class
        if (isPasswordRevealed) {
            toggleEye.classList.remove('fa-eye');
            toggleEye.classList.add('fa-eye-slash');
        } else {
            toggleEye.classList.remove('fa-eye-slash');
            toggleEye.classList.add('fa-eye');
        }
        // keep focus on input for better UX
        passwordInput.focus();
    });

    // Basic client validation (enhanced but not overly restrictive)
    function validateAdminInput() {
        const pass = passwordInput.value;
        if (!pass || pass.trim() === "") {
            showAdminToast("⚠️ يرجى إدخال كلمة مرور الأدمن", true);
            passwordInput.focus();
            shakeAdminCard();
            return false;
        }
        if (pass.length < 3) {
            showAdminToast("كلمة المرور قصيرة جداً (يجب أن تكون 3 محارف على الأقل)", true);
            passwordInput.focus();
            shakeAdminCard();
            return false;
        }
        return true;
    }

    // Main login logic: matches original spec but robust & fully functional across devices
    async function adminLogin() {
        if (!validateAdminInput()) {
            return;
        }

        const adminPassword = passwordInput.value;
        const payload = { password: adminPassword };

        // Store original button content
        const originalBtnHTML = loginBtn.innerHTML;
        loginBtn.disabled = true;
        loginBtn.classList.add('loading');
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري التحقق من الصلاحيات...';

        try {
            // Fetch request to exact endpoint from original spec "/api/admin/login"
            const response = await fetch("/api/admin/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            let data;
            try {
                data = await response.json();
            } catch (jsonErr) {
                console.warn("Invalid JSON response", jsonErr);
                data = { token: null, msg: "استجابة غير صالحة من الخادم" };
            }

            const adminToken = data?.token;

            // follow core logic: if token exists → success, store & redirect to dashboard
            // if no token but response indicates other errors: show message & keep user on page
            if (adminToken && typeof adminToken === 'string' && adminToken.length > 0) {
                localStorage.setItem("adminToken", adminToken);
                showAdminToast("✅ تم التحقق، مرحباً أيها المدير! جاري التوجيه...", false);
                // slight delay ensures toast is visible before redirect (better UX)
                setTimeout(() => {
                    location.href = "dashboard";
                }, 700);
            } else {
                // token missing or invalid: handle gracefully with server message or default
                const errorMsg = data?.msg || data?.message || "كلمة المرور غير صحيحة أو صلاحية غير كافية";
                showAdminToast(`⛔ ${errorMsg}`, true);
                shakeAdminCard();
                // clear password field for security and better interaction
                passwordInput.value = "";
                passwordInput.focus();
                // re-enable button (done in finally)
            }
        } catch (error) {
            console.error("Admin login network error:", error);
            let networkMsg = "❌ فشل الاتصال بالخادم. تأكد من اتصال الإنترنت أو أن الخادم يعمل.";
            if (error.name === "TypeError" && error.message.includes("Failed to fetch")) {
                networkMsg = "❌ لا يمكن الاتصال بالخادم. يرجى التأكد من تشغيل الخدمة.";
            }
            showAdminToast(networkMsg, true);
            shakeAdminCard();
            passwordInput.value = "";
            passwordInput.focus();
        } finally {
            // ensure button is re-enabled only if we haven't triggered redirect (status check)
            // but redirect is async, so we reset anyway. If redirect happens, component will unmount.
            loginBtn.disabled = false;
            loginBtn.classList.remove('loading');
            loginBtn.innerHTML = originalBtnHTML;
        }
    }

    // Attach event to login button
    loginBtn.addEventListener('click', (e) => {
        e.preventDefault();
        adminLogin();
    });

    // Allow Enter key on password input
    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            adminLogin();
        }
    });

    // On page load: initial setup and check for existing token (purely informative)
    window.addEventListener('load', () => {
        // ensure password field starts hidden and eye icon correct
        passwordInput.type = "password";
        isPasswordRevealed = false;
        toggleEye.classList.remove("fa-eye-slash");
        toggleEye.classList.add("fa-eye");
        
        // optional: show a friendly hint if token exists (only console log, no auto redirect to respect flow)
        const existingToken = localStorage.getItem("adminToken");
        if (existingToken) {
            console.log("ℹ️ رمز أدمن سابق موجود. يُرجى تسجيل الدخول مجدداً للوصول.");
        }
        
        // small accessibility enhancement: add role and label for eye button already present
        toggleEye.setAttribute('aria-label', 'إظهار أو إخفاء كلمة المرور');
        
        // extra responsive: prevent zoom on input focus on iOS (meta already set but ensure)
        const metaViewport = document.querySelector('meta[name="viewport"]');
        if (metaViewport) {
            metaViewport.setAttribute('content', 'width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes');
        }
    });
</script>
</body>
</html>
