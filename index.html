<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>نظام إدارة الدروس</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  body {
    font-family: 'Segoe UI', Arial;
    direction: rtl;
    background: #eef2f7;
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 1200px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 20px;
  }

  .header {
    background: #1e3c72;
    color: white;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
  }

  .panel {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  input, select {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    flex: 1;
  }

  button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #1e3c72;
    color: white;
  }

  table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
  }

  th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
  }
</style>
</head>

<body>

<script>
  // 🔴 تحويل تلقائي من الرابط الأساسي إلى صفحة تسجيل الدخول
  if (location.pathname === "/" || location.pathname === "/index.html") {
    location.replace("/signin.html");
  }
</script>

<div class="container">

  <div class="header">
    <h2>نظام إدارة الدروس</h2>
    <p id="teacherNameDisplay">الأستاذ /</p>
  </div>

  <div class="panel">
    <input id="name" placeholder="اسم الطالب">
    <input id="class" placeholder="الفصل">
    <input id="amount" placeholder="المبلغ">
    <button onclick="addStudent()">إضافة</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>الاسم</th>
        <th>الفصل</th>
        <th>المبلغ</th>
        <th>حذف</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script>
let students = JSON.parse(localStorage.getItem("students") || "[]");

function render() {
  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  students.forEach((s, i) => {
    body.innerHTML += `
      <tr>
        <td>${s.name}</td>
        <td>${s.class}</td>
        <td>${s.amount}</td>
        <td><button onclick="del(${i})">حذف</button></td>
      </tr>
    `;
  });

  localStorage.setItem("students", JSON.stringify(students));
}

function addStudent() {
  students.push({
    name: name.value,
    class: class.value,
    amount: amount.value
  });
  render();
}

function del(i) {
  students.splice(i, 1);
  render();
}

render();
</script>

</body>
</html>
